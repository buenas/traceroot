# Benchmark profile: separate database, silent SQL logging, clean numbers.

spring.datasource.url=jdbc:postgresql://localhost:5432/traceroot_benchmark
spring.datasource.username=
spring.datasource.password=

# Schema management.
# Change to "create" on first run to build schema from scratch, then
# switch back to "validate" once seeding is done.
spring.jpa.hibernate.ddl-auto=validate

# SILENCE SQL LOGGING. This is the critical override.
# Without these, 10M seed inserts become unusable.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# JDBC batch tuning.
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true

# Seed configuration (consumed by LogSeedRunner)
traceroot.benchmark.seed.count=10000000
traceroot.benchmark.seed.batch-size=5000
traceroot.benchmark.seed.random-seed=42

# LLM key not used in benchmark profile, but Spring still validates
# the property exists. Leave as placeholder to avoid startup failure.
traceroot.llm.openai.api-key=not-used

# Keep our benchmark-related classes at INFO so we see progress.
logging.level.com.traceroot.platform.benchmark=INFO

# OpenSearch configuration
traceroot.benchmark.opensearch.host=localhost
traceroot.benchmark.opensearch.port=9200
traceroot.benchmark.opensearch.scheme=http
traceroot.benchmark.opensearch.index-name=logs
traceroot.benchmark.opensearch.bulk-batch-size=5000
traceroot.benchmark.opensearch.pg-fetch-batch-size=5000