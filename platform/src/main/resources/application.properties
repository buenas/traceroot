spring.application.name=traceroot

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.datasource.url=jdbc:postgresql://localhost:5432/traceroot
spring.datasource.username=
spring.datasource.password=

spring.profiles.active=stub

traceroot.llm.openai.api-key=${OPENAI_API_KEY}
traceroot.llm.openai.model=gpt-4o-mini
traceroot.llm.openai.endpoint=https://api.openai.com/v1/chat/completions
traceroot.llm.openai.connect-timeout-ms=5000
traceroot.llm.openai.read-timeout-ms=30000
traceroot.llm.openai.max-retries=3